services:

  # ── Database ────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: omni-postgres
    restart: unless-stopped
    env_file:
      - ./omni-db/.env
    ports:
      - "5483:5432"
    volumes:
      - omni_pgdata:/var/lib/postgresql/data
      - ./omni-db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U omni -d omni_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend ─────────────────────────────────────────────────────────────────
  omni-backend:
    build:
      context: ./omni-backend
      dockerfile: Dockerfile
    container_name: omni-backend
    restart: unless-stopped
    env_file:
      - ./omni-backend/.env
    environment:
      - DATABASE_URL=postgresql+asyncpg://omni:omni_secret@postgres:5432/omni_db
      - ENVIRONMENT=dev
      - RAMPS_API_URL=http://host.docker.internal:8051/api
      - CORS_ORIGINS=["http://localhost:4252","http://127.0.0.1:4252"]
    ports:
      - "8052:8052"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./omni-backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8052 --reload
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ── Frontend ────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./omni-frontend
      dockerfile: Dockerfile
    container_name: omni-frontend
    restart: unless-stopped
    ports:
      - "4252:4252"
    depends_on:
      - omni-backend
    environment:
      - NODE_ENV=development
    volumes:
      - ./omni-frontend/src:/app/src
      - ./omni-frontend/angular.json:/app/angular.json
      - ./omni-frontend/tsconfig.json:/app/tsconfig.json
      - ./omni-frontend/tsconfig.app.json:/app/tsconfig.app.json

volumes:
  omni_pgdata:
